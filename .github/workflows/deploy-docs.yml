name: Deploy DocC to GitHub Pages

on:
  push:
    branches: ["main"]

# Set permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swiftly and Toolchains
        id: cache-swiftly
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftly
            ~/Library/Developer/Toolchains
          key: ${{ runner.os }}-swiftly-6.3

      - name: Install Swiftly and Swift 6.3
        if: steps.cache-swiftly.outputs.cache-hit != 'true'
        run: |
          curl -L -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --assume-yes
          ~/.swiftly/bin/swiftly install --use 6.3
        shell: bash

      - name: Export Swiftly to PATH
        run: |
          echo "$HOME/.swiftly/bin" >> $GITHUB_PATH
        shell: bash

      - name: Cache Swift dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            !.build/**/vsexpr*
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build DocC
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation --target vsexpr \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path vsexpr \
            --output-path ./docs

      - name: Add Redirect to Landing Page
        run: |
          touch ./docs/.nojekyll
          cat << 'EOF' > ./docs/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=documentation/vsexpr/" />
            </head>
            <body>
              <p>Redirecting to <a href="documentation/vsexpr/">documentation</a>...</p>
            </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
