name: Deploy DocC to GitHub Pages

on:
  push:
    branches: ["main"]

# Set permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      - name: Cache Swift dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            !.build/**/vsexpr*
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build DocC
        run: |
          xcrun swift package --allow-writing-to-directory ./docs \
            generate-documentation --target Vsexpr \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path vsexpr \
            --output-path ./docs

      - name: Add Redirect to Landing Page
        run: |
          touch ./docs/.nojekyll
          cat << 'EOF' > ./docs/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=documentation/Vsexpr/" />
            </head>
            <body>
              <p>Redirecting to <a href="documentation/Vsexpr/">documentation</a>...</p>
            </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
